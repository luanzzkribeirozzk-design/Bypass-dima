name: Release 8 Ball Pool APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update version in build.gradle
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          VERSION_CODE=$(echo $VERSION | tr -d 'v.' | sed 's/^0*//')
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" app/build.gradle
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" app/build.gradle

      - name: Build Release APK (signed)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
            export KEYSTORE_FILE=$(pwd)/keystore.jks
            ./gradlew assembleRelease
          else
            ./gradlew assembleRelease
          fi

      - name: Rename APK
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          mv app/build/outputs/apk/release/app-release*.apk app/build/outputs/apk/release/8BallPool-${VERSION}.apk || true
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/8BallPool-${VERSION}-unsigned.apk || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "8 Ball Pool ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## 8 Ball Pool ${{ steps.get_version.outputs.VERSION }}
            
            ### Download
            Download the APK below and install on your Android device.
            
            ### Requirements
            - Android 5.0 (API 21) or higher
            - Allow installation from unknown sources
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
