name: Build LN BYPASS APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite rodar manualmente se quiser

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Dar permissão ao Gradlew
        run: chmod +x gradlew

      - name: Compilar APK (Debug)
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_OPTS: "-Xmx2048m" # Aumenta a memória para não travar nos arquivos grandes

      - name: Salvar APK Gerado
        uses: actions/upload-artifact@v4
        with:
          name: LN-BYPASS-Final-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
